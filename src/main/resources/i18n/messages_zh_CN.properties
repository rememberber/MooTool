colorBoard.about.html=<h1>关于调色板</h1><p>调色板和取色器的设计借鉴了PicPick，其中的颜色主题更是完全照搬了过来。</p><p>颜色运算：取反对当前颜色取反色；相交/相加/差值/平均对当前颜色与对比色进行运算，结果更新为当前颜色。</p><p>按住 Shift 点击色块可将其设为对比色；点击对比色色块可自由选色。</p><p>PicPick是一款非常优秀的集取色、截图、标尺、放大镜、图片编辑等于一身的桌面应用，我非常喜欢它，感谢作者的付出！</p>

