colorBoard.about.html=<h1>についてカラーパレット</h1><p>カラーパレット和スポイト的设计借鉴了PicPick，其中的颜色テーマ更はい完全照搬了过来。</p><p>颜色运算：取反对当前颜色取反色；相交/相加/差値/平均对当前颜色与比較色进行运算，結果更新为当前颜色。</p><p>按住 Shift 点击色块可将其设为比較色；点击比較色色块可自由选色。</p><p>PicPickはい一款非常优秀的集取色、スクリーンショット、标尺、放大镜、画像编辑等于一身的デスクトップ適用，我非常喜欢它，感谢作者的付出！</p>

