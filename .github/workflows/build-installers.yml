name: Build installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target(s) to build
        required: true
        default: all
        type: choice
        options:
          - all
          - mac-intel
          - mac-apple-silicon
          - windows-x64
          - linux-x64
      release_tag:
        description: Existing Git tag / Release tag to append assets to during a manual run (for example: v1.7.0)
        required: false
        default: ""
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-mac-apple-silicon:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'mac-apple-silicon'
    name: macOS Apple Silicon
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Maven JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache repository-local JDKs
        uses: actions/cache@v4
        with:
          path: |
            jdks
            downloads/jdks
          key: ${{ runner.os }}-${{ runner.arch }}-jdks-v1-${{ hashFiles('scripts/prepare_jdks.py') }}

      - name: Prepare packaging JDK
        run: python -u scripts/prepare_jdks.py --targets mac-arm64

      - name: Build installer
        run: mvn --batch-mode --no-transfer-progress clean package -Pmac-apple-silicon -Dmaven.test.skip=true

      - name: Stage release assets
        run: >-
          python -u scripts/collect_release_assets.py
          --source-dir target/mac-apple-silicon
          --output-dir dist/mac-apple-silicon
          --target-label mac-apple-silicon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-apple-silicon
          path: |
            dist/mac-apple-silicon
          if-no-files-found: error
          retention-days: 14

  package-windows-x64:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'windows-x64'
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Maven JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache repository-local JDKs
        uses: actions/cache@v4
        with:
          path: |
            jdks
            downloads/jdks
          key: ${{ runner.os }}-${{ runner.arch }}-jdks-v1-${{ hashFiles('scripts/prepare_jdks.py') }}

      - name: Prepare packaging JDK
        run: python -u scripts/prepare_jdks.py --targets windows-x64

      - name: Build installer
        shell: cmd
        run: mvn --batch-mode --no-transfer-progress clean package -Pwindows-x64 -Dmaven.test.skip=true

      - name: Stage release assets
        run: >-
          python -u scripts/collect_release_assets.py
          --source-dir target/windows-x64
          --output-dir dist/windows-x64
          --target-label windows-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/windows-x64
          if-no-files-found: error
          retention-days: 14

  package-linux-x64:
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'linux-x64'
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Maven JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache repository-local JDKs
        uses: actions/cache@v4
        with:
          path: |
            jdks
            downloads/jdks
          key: ${{ runner.os }}-${{ runner.arch }}-jdks-v1-${{ hashFiles('scripts/prepare_jdks.py') }}

      - name: Prepare packaging JDK
        run: python -u scripts/prepare_jdks.py --targets linux-x64

      - name: Build installer
        run: mvn --batch-mode --no-transfer-progress clean package -Plinux-x64 -Dmaven.test.skip=true

      - name: Stage release assets
        run: >-
          python -u scripts/collect_release_assets.py
          --source-dir target/linux-x64
          --output-dir dist/linux-x64
          --target-label linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/linux-x64
          if-no-files-found: error
          retention-days: 14

  package-mac-intel-self-hosted:
    if: github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'mac-intel')
    name: macOS Intel (self-hosted)
    runs-on:
      - self-hosted
      - macOS
      - X64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify system Python
        run: python3 --version

      - name: Set up Maven JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache repository-local JDKs
        uses: actions/cache@v4
        with:
          path: |
            jdks
            downloads/jdks
          key: ${{ runner.os }}-${{ runner.arch }}-jdks-v1-${{ hashFiles('scripts/prepare_jdks.py') }}

      - name: Prepare packaging JDK
        run: python3 -u scripts/prepare_jdks.py --targets mac-x64 --java-home "$JAVA_HOME"

      - name: Build installer
        run: mvn --batch-mode --no-transfer-progress clean package -Pmac-intel -Dmaven.test.skip=true

      - name: Stage release assets
        run: >-
          python3 -u scripts/collect_release_assets.py
          --source-dir target/mac-intel
          --output-dir dist/mac-intel
          --target-label mac-intel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-intel
          path: |
            dist/mac-intel
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-mac-apple-silicon
      - package-windows-x64
      - package-linux-x64
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.pkg
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.msi
            release-assets/**/*.exe
            release-assets/**/*.jar

  release-manual-assets:
    name: Append assets to existing GitHub Release
    if: ${{
      always()
      && github.event_name == 'workflow_dispatch'
      && inputs.release_tag != ''
      && (
        needs.package-mac-apple-silicon.result == 'success'
        || needs.package-windows-x64.result == 'success'
        || needs.package-linux-x64.result == 'success'
        || needs.package-mac-intel-self-hosted.result == 'success'
      )
    }}
    needs:
      - package-mac-apple-silicon
      - package-windows-x64
      - package-linux-x64
      - package-mac-intel-self-hosted
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Append assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.pkg
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.msi
            release-assets/**/*.exe
            release-assets/**/*.jar


